<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tiber Visualizer</title>
<link rel="stylesheet" href="src/style.css">
</head>
<body>
<h1>Tiber AES Visualizer</h1>

<label for="key">Key (hex, 16 bytes):</label>
<input id="key" type="text" maxlength="47" value="00000000000000000000000000000000">

<label for="plaintext">Plaintext (16 bytes):</label>
<div class="radio-group">
  <label><input type="radio" name="pt-format" value="ascii" checked> ASCII</label>
  <label><input type="radio" name="pt-format" value="hex"> Hex</label>
</div>
<input id="plaintext" type="text" value="Hello, world!">

<button id="encrypt">Show Encryption Rounds</button>
<button id="decrypt">Show Decryption Rounds</button>
<div class="rounds" id="rounds"></div>

<script type="module" src="src/main.js"></script>
</body>
</html>
