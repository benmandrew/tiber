name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      - name: Cache rustup toolchains
        uses: actions/cache@v4
        with:
          path: .nix-rust
          key: ${{ runner.os }}-nix-rust-${{ hashFiles('flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-nix-rust-
      - name: Check formatting
        run: nix develop -c make fmt-ci
      - name: Lint
        run: nix develop -c make lint
      - name: Docs
        run: nix develop -c cargo doc --document-private-items

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      - name: Cache rustup toolchains
        uses: actions/cache@v4
        with:
          path: .nix-rust
          key: ${{ runner.os }}-nix-rust-${{ hashFiles('flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-nix-rust-
      - name: Build
        run: nix develop -c make
      - name: Test
        run: nix develop -c cargo test --all-targets

  fuzz:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      - name: Cache rustup toolchains
        uses: actions/cache@v4
        with:
          path: .nix-rust
          key: ${{ runner.os }}-nix-rust-${{ hashFiles('flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-nix-rust-
      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus/roundtrip
          key: fuzz-corpus-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-
      - name: Generate seed corpus
        run: nix develop -c make fuzz-corpus
      - name: Build fuzz target
        run: nix develop -c make fuzz-build
      - name: Replay corpus
        run: nix develop -c cargo +nightly fuzz run roundtrip fuzz/corpus/roundtrip -- -runs=0
      - name: Fuzz (60s)
        run: nix develop -c cargo +nightly fuzz run roundtrip fuzz/corpus/roundtrip -- -max_total_time=60 -print_final_stats=1

  docker:
    name: Push Docker Image (${{ matrix.name }})
    needs: [test, fuzz]
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tiber
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          platforms: ${{ matrix.platform }}

      - name: Export digest for manifest job
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-web-${{ matrix.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Push Docker Manifest
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main'
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tiber
    steps:
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-web-*
          merge-multiple: true

      - name: Create multi-arch latest tag
        run: |
          set --
          for f in /tmp/digests/*; do
            set -- "$@" "${IMAGE}@sha256:$(basename "$f")"
          done
          docker buildx imagetools create --tag "${IMAGE}:latest" "$@"

  docker-fuzz:
    name: Push Fuzz Docker (${{ matrix.name }})
    needs: [test, fuzz]
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tiber
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.fuzz
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=fuzz-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=fuzz-${{ matrix.name }}

      - name: Export digest for manifest job
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-fuzz-${{ matrix.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-fuzz-manifest:
    name: Push Fuzz Docker Manifest
    runs-on: ubuntu-latest
    needs: [docker-fuzz]
    if: github.ref == 'refs/heads/main'
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/tiber
    steps:
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-fuzz-*
          merge-multiple: true

      - name: Create multi-arch fuzz tag
        run: |
          set --
          for f in /tmp/digests/*; do
            set -- "$@" "${IMAGE}@sha256:$(basename "$f")"
          done
          docker buildx imagetools create --tag "${IMAGE}:fuzz" "$@"
